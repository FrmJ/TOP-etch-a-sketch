<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Etch-A-Sketch</h1>
    <div class="board-buttons">
        <button class="grid-button">Change grid size</button>
        <button class="randomize-button">Randomize Colors</button>
    </div>
    <p class="grid-number">Grid: <span>12 x 12</span></p>
    <p class="randomize-toggle">Randomize Colors: <span>OFF</span></p>
    <div class="board-container"></div>
    <div class="footer"></div>
</body>
</html>
